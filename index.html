
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我的个人博客</title>
  <style>
    /* 重置与基础样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f8f9fa;
    }

    /* 英雄区域 */
    .hero {
      height: 80vh;
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                  url('https://source.unsplash.com/random/1600x900/?nature') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero-content h1 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .hero-content p {
      font-size: 1.5rem;
      opacity: 0.9;
    }

    /* 主容器 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* 分类卡片 */
    .category {
      display: flex;
      margin-bottom: 3rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      height: 400px;
    }

    .category:last-child {
      margin-bottom: 0;
    }

    .category-content {
      flex: 1;
      padding: 3rem;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .category-content h2 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #2c3e50;
    }

    .category-content p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #555;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 1.5rem;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #2980b9;
      transform: translateY(-2px);
    }

    .category-bg {
      flex: 1;
      background-size: cover;
      background-position: center;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .category {
        flex-direction: column;
        height: auto;
      }

      .hero-content h1 {
        font-size: 2.5rem;
      }

      .hero-content p {
        font-size: 1.2rem;
      }

      .category-content,
      .category-bg {
        height: 300px;
      }
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 2rem 0;
      background-color: #2c3e50;
      color: #ecf0f1;
      margin-top: 3rem;
    }

    .footer a {
      color: #3498db;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- 英雄区域 -->
  <header class="hero">
    <div class="hero-content">
      <h1>你好，我是[你的名字]</h1>
      <p>欢迎来到我的个人空间</p>
    </div>
  </header>

  <!-- 主内容：三大标签 -->
  <main class="container">
    <!-- 工作 -->
    <section class="category" id="work">
      <div class="category-content">
        <h2>工作</h2>
        <p>记录我的职业成长、项目经验与技术思考。</p>
        <a href="/work/" class="btn">查看工作日志 →</a>
      </div>
      <div class="category-bg" style="background-image: url('https://source.unsplash.com/random/800x600/?office,work');"></div>
    </section>

    <!-- 爱好 -->
    <section class="category" id="hobby">
      <div class="category-content">
        <h2>爱好</h2>
        <p>摄影、编程、阅读、音乐……这里是我的兴趣天地。</p>
        <a href="/hobby/" class="btn">探索我的爱好 →</a>
      </div>
      <div class="category-bg" style="background-image: url('https://source.unsplash.com/random/800x600/?hobby,fun');"></div>
    </section>

    <!-- 生活 -->
    <section class="category" id="life">
      <div class="category-content">
        <h2>生活</h2>
        <p>旅行见闻、日常感悟、美食分享，记录平凡中的美好。</p>
        <a href="/life/" class="btn">走进我的生活 →</a>
      </div>
      <div class="category-bg" style="background-image: url('https://source.unsplash.com/random/800x600/?lifestyle,people');"></div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; 2025 <a href="https://github.com/你的GitHub用户名">你的名字</a>. 使用 GitHub Pages 构建.</p>
  </footer>

  <!-- 可选：添加简单交互（例如平滑滚动） -->
  <script>
    // 示例：点击按钮时平滑滚动到对应区域（可扩展）
    document.querySelectorAll('.btn').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = this.getAttribute('href');
        if (target && target !== '/') {
          // 这里可以添加导航逻辑，比如跳转或锚点滚动
          window.location.href = target;
        }
      });
    });
  </script>

</body>
</html>
