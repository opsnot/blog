<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客 - 单屏版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 1200px;
        }
        .category {
            background-color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1em;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 工作 -->
        <div class="category">
            <h2>工作</h2>
            <p>专注于前端开发与用户体验设计，参与过多个Web应用项目，热爱技术分享与持续学习。</p>
        </div>

        <!-- 爱好 -->
        <div class="category">
            <h2>爱好</h2>
            <p>喜欢摄影、徒步旅行、阅读科技与人文书籍，也常在周末写点小项目练手。</p>
        </div>

        <!-- 生活 -->
        <div class="category">
            <h2>生活</h2>
            <p>记录生活中的小确幸：一次日出、一顿美食、一段旅程，都是值得珍藏的瞬间。</p>
        </div>
    </div>
</body>
</html>
